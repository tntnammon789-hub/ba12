<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise 3D Spare Part Catalog - Alpha Compact LH/RH</title>
    <style>
        /* จัดระเบียบหน้าจอดิจิทัลทวินสไตล์พรีเมียม */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
        }

        .wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* หน้าจอกราฟิก 3D สตูดิโอ (75%) */
        #canvas-container {
            width: 75vw;
            height: 100vh;
            position: relative;
            background: radial-gradient(circle, #2a2a2a 0%, #141414 100%);
            box-sizing: border-box;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* แผงควบคุมและรายการแคตตาล็อกด้านขวา (25%) */
        #sidebar {
            width: 25vw;
            height: 100vh;
            background-color: #1e1e1e;
            border-left: 2px solid #2d2d2d;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
        }

        .sidebar-header {
            padding: 24px 20px;
            background: linear-gradient(135deg, #0e639c 0%, #064573 100%);
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-bottom: 1px solid #1177bb;
        }

        .section-title {
            padding: 12px 20px;
            background-color: #252526;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #8e8e8e;
            border-bottom: 1px solid #2d2d2d;
            border-top: 1px solid #2d2d2d;
        }

        /* รายการชิ้นส่วนพร้อมระบุสถานะและรหัส */
        #parts-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: #1e1e1e;
        }

        .part-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #252526;
            margin-bottom: 10px;
            padding: 12px 14px;
            border-radius: 6px;
            border: 1px solid #333333;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .part-item:hover {
            border-color: #0e639c;
            background-color: #2d2d30;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .part-info { display: flex; flex-direction: column; max-width: 80%; }
        .part-id { font-size: 0.75rem; color: #0e639c; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 2px; }
        .part-name { font-size: 0.9rem; color: #e0e0e0; font-weight: 500; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        /* ระบบเช็คบ็อกซ์สไตล์โมเดิร์น */
        .checkbox-container {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .checkbox-container input { display: none; }
        .custom-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid #555;
            border-radius: 4px;
            display: inline-block;
            transition: all 0.2s ease;
        }
        .checkbox-container input:checked + .custom-checkbox {
            background-color: #0e639c;
            border-color: #0e639c;
        }

        /* พื้นที่แสดงรายการพาร์ทลิสต์ที่เลือก (Cart) */
        #cart-container {
            height: 42vh;
            background-color: #141414;
            border-top: 2px solid #2d2d2d;
            display: flex;
            flex-direction: column;
        }

        #cart-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #212121;
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            border-left: 4px solid #0e639c;
            border-top: 1px solid #2d2d2d;
            border-right: 1px solid #2d2d2d;
            border-bottom: 1px solid #2d2d2d;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-qty {
            background-color: #2d2d30;
            color: #fff;
            border: 1px solid #444;
            padding: 4px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .btn-qty:hover { background-color: #0e639c; border-color: #1177bb; }

        .btn-remove {
            background-color: #4a1515;
            color: #ff8888;
            border: 1px solid #662222;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
            transition: background 0.2s;
        }
        .btn-remove:hover { background-color: #a61c1c; color: #fff; }

        /* กล่องป๊อปอัปตามพิกัดลูกศรเมาส์ (Tooltip) */
        #tooltip {
            position: fixed;
            display: none;
            background-color: rgba(20, 20, 20, 0.95);
            border: 2px solid #0e639c;
            padding: 14px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            width: 240px;
            backdrop-filter: blur(4px);
        }

        #tooltip img {
            width: 100%;
            height: auto;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid #333;
            background-color: #fff;
        }

        .tooltip-title { font-weight: 700; color: #0e639c; font-size: 0.8rem; letter-spacing: 0.5px; }
        .tooltip-name { font-size: 0.95rem; margin-top: 4px; color: #ffffff; font-weight: 600; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div class="wrapper">
        
        <!-- ฝั่งหน้าจอแสดงผล 3D สตูดิโอ -->
        <div id="canvas-container">
            <div id="tooltip">
                <img id="tooltip-img" src="" alt="Part Image">
                <div id="tooltip-id" class="tooltip-title">PART NO: </div>
                <div id="tooltip-name" class="tooltip-name">Part Name</div>
            </div>
        </div>

        <!-- แผงด้านขวาควบคุมรายการสินค้าและคลังข้อมูลอะไหล่ -->
        <div id="sidebar">
            <div class="sidebar-header">ALPHA COMPACT INDUSTRIAL</div>
            
            <div class="section-title">Available Parts (Hover/Select)</div>
            <div id="parts-list"></div>
            
            <div class="section-title">Selected Parts List (Cart)</div>
            <div id="cart-container">
                <div id="cart-list"></div>
            </div>
        </div>

    </div>

    <script>
        // 1. ฐานข้อมูลอะไหล่เต็มรูปแบบ อ้างอิงตรงตามสเปกคู่มือ Alpha Compact ทั้งหมด 100%
        const masterSparePartsCatalog = {
            "BAUGRUPPE_A_CHASSIS": [
                { id: "40003272", name: "Cover with controller LH", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Cover+LH" },[cite: 1]
                { id: "40003271", name: "Cover with controller RH", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Cover+RH" },[cite: 1]
                { id: "32912434", name: "Deckel Alpha Compact Base", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Deckel+Alpha" },[cite: 1]
                { id: "32910047", name: "Plate connector assignment LH", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Plate+LH" },[cite: 1]
                { id: "32910036", name: "Plate connector assignment RH", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Plate+RH" },[cite: 1]
                { id: "40003268", name: "Power pack Base LH Unit", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Power+Pack+LH" },[cite: 1]
                { id: "40003269", name: "Power pack Base RH Unit", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Power+Pack+RH" },[cite: 1]
                { id: "33016858", name: "CPU/IO-Board System controller", img: "https://via.placeholder.com/200x120/ffffff/000000?text=CPU+IO+Board" },[cite: 1]
                { id: "33016788", name: "Motor-Board Drive controller", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Motor+Board" },[cite: 1]
                { id: "32909028", name: "Main switch / Geräteschalter", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Main+Switch" }[cite: 1]
            ],
            "BAUGRUPPE_B_TRANSPORT": [
                { id: "32901023", name: "Drive roller corund 120mm", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Corund+120mm" },[cite: 1]
                { id: "32901027", name: "Drive roller rubber 120mm", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Rubber+120mm" },[cite: 1]
                { id: "32901024", name: "Drive roller corund 150mm", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Corund+150mm" },[cite: 1]
                { id: "32901028", name: "Drive roller rubber 150mm", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Rubber+150mm" },[cite: 1]
                { id: "33001631", name: "Timing belt / Zahnriemen Drive", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Timing+Belt" },[cite: 1]
                { id: "33001636", name: "Zahnriemenrad / Pulley 14-T5", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Pulley+14-T5" },[cite: 1]
                { id: "33016851", name: "Main Step Motor Drive", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Main+Motor" },[cite: 1]
                { id: "35001958", name: "Eingreifschutz / Hand protection", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Hand+Protection" }[cite: 1]
            ],
            "BAUGRUPPE_C_REWINDER": [
                { id: "35001797", name: "Dancer complete system / Tänzer", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Dancer+Arm" },[cite: 1]
                { id: "35001777", name: "Rewinder shaft 120mm Core", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Rewind+Shaft+120" },[cite: 1]
                { id: "35001926", name: "Rewinder shaft 150mm Core", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Rewind+Shaft+150" },[cite: 1]
                { id: "33005257", name: "Rundriemen / Round belt drive", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Round+Belt" },[cite: 1]
                { id: "32907671", name: "Aufspullteller / Rewinder plate", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Rewinder+Plate" },[cite: 1]
                { id: "32911430", name: "Aufspulkern / Rewind core unit", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Rewind+Core" }[cite: 1]
            ],
            "BAUGRUPPE_D_UNWINDER_AND_SENSORS": [
                { id: "35002061", name: "Unwinder arm 120mm LH Component", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Unwind+Arm+120LH" },[cite: 1]
                { id: "35001873", name: "Unwinder arm 120mm RH Component", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Unwind+Arm+120RH" },[cite: 1]
                { id: "33001934", name: "Abspulkern 3\" / Unwind core roll", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Unwind+Core+3" },[cite: 1]
                { id: "33010487", name: "Bremsband / Friction brake belt", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Brake+Belt" },[cite: 1]
                { id: "33090245", name: "Label sensor OGUTI Fixed Element", img: "https://via.placeholder.com/200x120/ffffff/000000?text=OGUTI+Sensor" },[cite: 1]
                { id: "33010671", name: "Label sensor USGT Ultrasonic Block", img: "https://via.placeholder.com/200x120/ffffff/000000?text=USGT+Sensor" },[cite: 1]
                { id: "33001556", name: "Klemmstück / Clamp fixing block", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Clamp+Block" }[cite: 1]
            ]
        };

        // ยุบรวมกลุ่มข้อมูลให้เป็น Flat Database ระดับระบุพิกัดชิ้นเดี่ยว
        let partDatabase = {};
        let selectedPartsCart = {};
        let independentMeshRegistry = []; // อาเรย์เก็บเก็บเฉพาะวัตถุ Mesh เดี่ยวที่ผ่านการผ่าตัดโครงสร้างแล้ว

        // ฟังก์ชันเกลี่ยกระจายรายการชิ้นส่วนอะไหล่ทั้งหมดเข้าสู่คลังระบบ
        let globalCounter = 1;
        for (const [groupName, items] of Object.entries(masterSparePartsCatalog)) {
            items.forEach((item) => {
                let generatedKey = "Isolated_Mesh_ID_" + String(globalCounter).padStart(3, '0');
                partDatabase[generatedKey] = {
                    id: item.id,
                    name: item.name,
                    img: item.img
                };
                globalCounter++;
            });
        }

        // จัดพิมพ์โครงสร้างแคตตาล็อกฝั่ง Sidebar UI ด้านขวา
        const partsListUI = document.getElementById('parts-list');
        for (const [uniqueId, info] of Object.entries(partDatabase)) {
            const item = document.createElement('div');
            item.className = 'part-item';
            item.innerHTML = `
                <div class="part-info">
                    <span class="part-id">P/N: ${info.id}</span>
                    <span class="part-name">${info.name}</span>
                </div>
                <label class="checkbox-container">
                    <input type="checkbox" id="check-${uniqueId}" onchange="togglePart('${uniqueId}', this.checked)">
                    <span class="custom-checkbox"></span>
                </label>
            `;
            partsListUI.appendChild(item);
        }

        function togglePart(uniqueId, isChecked) {
            if (isChecked) {
                if (!selectedPartsCart[uniqueId]) selectedPartsCart[uniqueId] = 1;
            } else {
                delete selectedPartsCart[uniqueId];
            }
            updateCartUI();
        }

        function adjustQty(uniqueId, change) {
            if (selectedPartsCart[uniqueId]) {
                selectedPartsCart[uniqueId] += change;
                if (selectedPartsCart[uniqueId] <= 0) {
                    delete selectedPartsCart[uniqueId];
                    const cb = document.getElementById(`check-${uniqueId}`);
                    if(cb) cb.checked = false;
                }
                updateCartUI();
            }
        }

        function removePart(uniqueId) {
            delete selectedPartsCart[uniqueId];
            const cb = document.getElementById(`check-${uniqueId}`);
            if(cb) cb.checked = false;
            updateCartUI();
        }

        function updateCartUI() {
            const cartListUI = document.getElementById('cart-list');
            cartListUI.innerHTML = '';
            
            for (const [uniqueId, qty] of Object.entries(selectedPartsCart)) {
                const info = partDatabase[uniqueId];
                const item = document.createElement('div');
                item.className = 'cart-item';
                item.innerHTML = `
                    <div style="display:flex; flex-direction:column; max-width:60%;">
                        <span style="font-weight:700; font-size:0.75rem; color:#0e639c;">${info.id}</span>
                        <span style="text-overflow:ellipsis; overflow:hidden; white-space:nowrap; font-weight:600; color:#fff;">${info.name}</span>
                    </div>
                    <div class="qty-controls">
                        <button class="btn-qty" onclick="adjustQty('${uniqueId}', -1)">-</button>
                        <span style="font-weight:700; min-width:15px; text-align:center;">${qty}</span>
                        <button class="btn-qty" onclick="adjustQty('${uniqueId}', 1)">+</button>
                        <button class="btn-remove" onclick="removePart('${uniqueId}')">✕</button>
                    </div>
                `;
                cartListUI.appendChild(item);
            }
        }

        // ================= เอนจิ้นหลักสามมิติ Three.js Studio =================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // อัปเกรดหมอกและมิติความลึกของแสงเงาพื้นหลังให้สมจริง
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.015);

        const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(20, 15, 35);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 100;
        controls.minDistance = 5;

        // อัปเกรดระบบจัดวางแสงสตูดิโอระดับเวิร์ลคลาส (Professional Lighting Grid)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(20, 40, 20);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.bias = -0.0001;
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0x90b0ff, 0.4);
        fillLight.position.set(-20, 20, -20);
        scene.add(fillLight);

        const rimLight = new THREE.PointLight(0xffffff, 0.6, 50);
        rimLight.position.set(0, 20, 0);
        scene.add(rimLight);

        // โหลดโมเดลวิศวกรรมจากเซิร์ฟเวอร์
        const filename = "32100033_A_Comp_120_RH.step.glb";
        const loader = new THREE.GLTFLoader();
        let loadedModel;
        
        loader.load(filename, function (gltf) {
            loadedModel = gltf.scene;
            
            const box = new THREE.Box3().setFromObject(loadedModel);
            const center = box.getCenter(new THREE.Vector3());
            loadedModel.position.x += (loadedModel.position.x - center.x);
            loadedModel.position.y += (loadedModel.position.y - center.y);
            loadedModel.position.z += (loadedModel.position.z - center.z);
            
            let databaseKeys = Object.keys(partDatabase);
            let keyIndex = 0;
            
            // อัลกอริทึมสแกนรื้อระบบผืนผ้าวัสดุ (Dynamic Material Disconnection Pipeline)
            // เพื่อทำการ "ตัดไดคัต" สลายโครงสร้างวัสดุเดิมแยกจากกันแบบชิ้นใครชิ้นมันเด็ดขาด 100%
            loadedModel.traverse((node) => {
                if (node.isMesh) {
                    // ทำการโคลนและตัดการเชื่อมโยงของ Material อย่างสมบูรณ์ ป้องกันปัญหาสีลามข้ามวัตถุ
                    if (node.material) {
                        node.material = node.material.clone();
                        // อัปเกรดคุณสมบัติทางแสงสไตล์ Metallic อุตสาหกรรมชิ้นส่วนเครื่องจักร
                        node.material.roughness = 0.4;
                        node.material.metalness = 0.6;
                    }
                    
                    node.castShadow = true;
                    node.receiveShadow = true;
                    
                    // ออกรหัสความจำผูกชิ้นต่อชิ้นเข้ากับฐานข้อมูลคลังอะไหล่ฝั่งขวา
                    let finalAssignedKey = databaseKeys[keyIndex % databaseKeys.length];
                    node.name = finalAssignedKey;
                    
                    // ลงทะเบียนเข้าสู่อาร์เรย์ตรวจสอบพิกัดยิงแสงของเมาส์โดยตรง
                    independentMeshRegistry.push(node);
                    keyIndex++;
                }
            });

            scene.add(loadedModel);
        });

        // ================= ระบบ Raycasting เจาะลึกตรวจสอบพิกัดผิวตาข่ายตรง ๆ (No Floating Points) =================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');
        const tooltipImg = document.getElementById('tooltip-img');
        const tooltipId = document.getElementById('tooltip-id');
        const tooltipName = document.getElementById('tooltip-name');
        let currentActiveMesh = null;

        window.addEventListener('mousemove', onMouseMove, false);
        window.addEventListener('click', onModelClick, false);

        // ระบบดักพิกัดลูกศรเมาส์ชี้วัตถุกายภาพโดยตรง
        function onMouseMove(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            tooltip.style.left = (event.clientX + 15) + 'px';
            tooltip.style.top = (event.clientY + 15) + 'px';

            if (independentMeshRegistry.length > 0) {
                raycaster.setFromCamera(mouse, camera);
                // สั่งการให้ Raycaster ตรวจสอบความละเอียดระดับผิวเนื้อวัตถุโดยตรง (false = เช็คระดับลึกสุด ไม่เช็ค Group ชั้นนอก)
                const intersects = raycaster.intersectObjects(independentMeshRegistry, false);

                if (intersects.length > 0) {
                    const hitMesh = intersects[0].object;
                    
                    if (partDatabase[hitMesh.name]) {
                        if (currentActiveMesh !== hitMesh) {
                            // สั่งปิดเอฟเฟกต์สีเรืองแสงของพาร์ทชิ้นก่อนหน้า
                            if (currentActiveMesh) currentActiveMesh.material.emissive.setHex(0x000000);
                            
                            currentActiveMesh = hitMesh;
                            // ไฮไลท์เรืองแสงสีฟ้าอุตสาหกรรม (0x0e639c) เฉพาะชิ้นเดี่ยวชิ้นที่คุณกำลังชี้อยู่ตรง ๆ เท่านั้น!
                            currentActiveMesh.material.emissive.setHex(0x0e639c);

                            const pInfo = partDatabase[hitMesh.name];
                            tooltipImg.src = pInfo.img;
                            tooltipId.innerText = "PART NO: " + pInfo.id;
                            tooltipName.innerText = pInfo.name;
                            tooltip.style.display = 'block';
                        }
                    }
                } else {
                    if (currentActiveMesh) currentActiveMesh.material.emissive.setHex(0x000000);
                    currentActiveMesh = null;
                    tooltip.style.display = 'none';
                }
            }
        }

        // ระบบคลิกที่เนื้อวัตถุชิ้นงานเพื่อติ๊กเครื่องหมายถูกฝั่งขวา
        function onModelClick(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            if (event.clientX > rect.right || event.clientX < rect.left || event.clientY > rect.bottom || event.clientY < rect.top) {
                return;
            }

            if (independentMeshRegistry.length > 0) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(independentMeshRegistry, false);

                if (intersects.length > 0) {
                    const hitMesh = intersects[0].object;
                    const uniqueId = hitMesh.name;
                    
                    if (partDatabase[uniqueId]) {
                        const cb = document.getElementById(`check-${uniqueId}`);
                        if (cb) {
                            // สลับค่าเครื่องหมายติ๊กถูกในกล่องสี่เหลี่ยมด้านขวา และสั่งให้พาร์ทนั้นเด้งลงตะกร้าสรุปรายการด้านล่าง
                            cb.checked = !cb.checked;
                            togglePart(uniqueId, cb.checked);
                        }
                    }
                }
            }
        }

        // Render & Control Loop Pipeline
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // ระบบรองรับการยืดหยุ่นขนาดหน้าจออัจฉริยะ (Responsive Layout)
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
    </script>
</body>
</html>
