<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional 3D Spare Part Catalog - 1-to-1 Independent Parts</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
        }

        .wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* หน้าจอแสดงผล 3D (75%) */
        #canvas-container {
            width: 75vw;
            height: 100vh;
            position: relative;
            background-color: #222222;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            cursor: pointer;
        }

        /* Sidebar รายการด้านข้าง (25%) */
        #sidebar {
            width: 25vw;
            height: 100vh;
            background-color: #262626;
            border-left: 2px solid #3a3a3a;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #0e639c;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .section-title {
            padding: 10px 20px;
            background-color: #333333;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            border-bottom: 1px solid #444;
        }

        #parts-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .part-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #333;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #444;
            transition: all 0.2s ease;
        }

        .part-item:hover {
            border-color: #0e639c;
            background-color: #3d3d3d;
        }

        .part-info { display: flex; flex-direction: column; max-width: 80%; }
        .part-id { font-size: 0.75rem; color: #0e639c; font-weight: bold; }
        .part-name { font-size: 0.9rem; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        /* ตะกร้าสรุปรายการสั่งอะไหล่ด้านล่าง */
        #cart-container {
            height: 40vh;
            background-color: #1e1e1e;
            border-top: 2px solid #3a3a3a;
            display: flex;
            flex-direction: column;
        }

        #cart-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #2d2d2d;
            padding: 8px 12px;
            margin-bottom: 6px;
            border-radius: 4px;
            font-size: 0.85rem;
            border-left: 4px solid #0e639c;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-qty {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 2px 6px;
            cursor: pointer;
            border-radius: 3px;
            font-weight: bold;
        }
        .btn-qty:hover { background-color: #1177bb; }

        .btn-remove {
            background-color: #a61c1c;
            color: white;
            border: none;
            padding: 2px 6px;
            cursor: pointer;
            border-radius: 3px;
        }

        /* Tooltip โผล่ตามตำแหน่งเมาส์ชี้ */
        #tooltip {
            position: fixed;
            display: none;
            background-color: rgba(30, 30, 30, 0.95);
            border: 2px solid #0e639c;
            padding: 12px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 220px;
        }

        #tooltip img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 8px;
            border: 1px solid #444;
            background-color: #fff;
        }

        .tooltip-title { font-weight: bold; color: #0e639c; font-size: 0.85rem; }
        .tooltip-name { font-size: 0.9rem; margin-top: 2px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div class="wrapper">
        
        <!-- ฝั่งหน้าจอ 3D -->
        <div id="canvas-container">
            <div id="tooltip">
                <img id="tooltip-img" src="" alt="Part Image">
                <div id="tooltip-id" class="tooltip-title">PART NO: </div>
                <div id="tooltip-name" class="tooltip-name">Part Name</div>
            </div>
        </div>

        <!-- ฝั่งแผงควบคุมและรายการด้านข้าง -->
        <div id="sidebar">
            <div class="sidebar-header">ALPHA COMPACT LH / RH</div>[cite: 1]
            
            <div class="section-title">Available Parts (Hover/Select)</div>
            <div id="parts-list"></div>
            
            <div class="section-title">Selected Parts List (Cart)</div>
            <div id="cart-container">
                <div id="cart-list"></div>
            </div>
        </div>

    </div>

    <script>
        // ประกาศฐานข้อมูลพาร์ทเริ่มต้นเป็นออบเจกต์ว่าง เพื่อรอรับการทำงานแบบ Dynamic จากตัวโมเดล 3D
        let partDatabase = {};
        let selectedPartsCart = {};

        // ฟังก์ชันสร้างรายการชิ้นส่วนฝั่ง Sidebar UI แบบไดนามิกหลังจากอ่านโมเดลเสร็จ
        function buildPartsListUI() {
            const partsListUI = document.getElementById('parts-list');
            partsListUI.innerHTML = ''; // เคลียร์ค่าเก่าก่อนสร้าง
            
            for (const [meshName, info] of Object.entries(partDatabase)) {
                const item = document.createElement('div');
                item.className = 'part-item';
                item.innerHTML = `
                    <div class="part-info">
                        <span class="part-id">P/N: ${info.id}</span>
                        <span class="part-name">${info.name}</span>
                    </div>
                    <input type="checkbox" id="check-${meshName}" onchange="togglePart('${meshName}', this.checked)">
                `;
                partsListUI.appendChild(item);
            }
        }

        function togglePart(meshName, isChecked) {
            if (isChecked) {
                if (!selectedPartsCart[meshName]) {
                    selectedPartsCart[meshName] = 1;
                }
            } else {
                delete selectedPartsCart[meshName];
            }
            updateCartUI();
        }

        function adjustQty(meshName, change) {
            if (selectedPartsCart[meshName]) {
                selectedPartsCart[meshName] += change;
                if (selectedPartsCart[meshName] <= 0) {
                    delete selectedPartsCart[meshName];
                    const cb = document.getElementById(`check-${meshName}`);
                    if(cb) cb.checked = false;
                }
                updateCartUI();
            }
        }

        function removePart(meshName) {
            delete selectedPartsCart[meshName];
            const cb = document.getElementById(`check-${meshName}`);
            if(cb) cb.checked = false;
            updateCartUI();
        }

        function updateCartUI() {
            const cartListUI = document.getElementById('cart-list');
            cartListUI.innerHTML = '';
            
            for (const [meshName, qty] of Object.entries(selectedPartsCart)) {
                const info = partDatabase[meshName];
                const item = document.createElement('div');
                item.className = 'cart-item';
                item.innerHTML = `
                    <div style="display:flex; flex-direction:column; max-width:60%;">
                        <span style="font-weight:bold; font-size:0.75rem; color:#0e639c;">${info.id}</span>
                        <span style="text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">${info.name}</span>
                    </div>
                    <div class="qty-controls">
                        <button class="btn-qty" onclick="adjustQty('${meshName}', -1)">-</button>
                        <span>${qty}</span>
                        <button class="btn-qty" onclick="adjustQty('${meshName}', 1)">+</button>
                        <button class="btn-remove" onclick="removePart('${meshName}')">✕</button>
                    </div>
                `;
                cartListUI.appendChild(item);
            }
        }

        // ================= เอนจิ้นหลัก Three.js =================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 15, 35);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(15, 30, 20);
        scene.add(dirLight);

        // รายการข้อมูลตัวอย่างเพื่อนำมาหยอดชิ้นส่วนหลัก ๆ ให้สมจริงในช่วงแรก
        const sampleDescriptions = [
            "Gehäuse Alpha Compact / Chassis", "Drive roller rubber 120mm", "Rewinder Plate", "Unwind core 3\"",[cite: 1]
            "Timing belt", "Pulley 14-T5", "Main Drive Motor", "Hand protection", "Dancer complete",[cite: 1]
            "Rewinder shaft", "Round belt", "Label sensor OGUTI", "Label sensor USGT", "Clamp"[cite: 1]
        ];

        // โหลดโมเดล 3D
        const filename = "32100033_A_Comp_120_RH.step.glb";
        const loader = new THREE.GLTFLoader();
        let loadedModel;
        
        loader.load(filename, function (gltf) {
            loadedModel = gltf.scene;
            
            const box = new THREE.Box3().setFromObject(loadedModel);
            const center = box.getCenter(new THREE.Vector3());
            loadedModel.position.x += (loadedModel.position.x - center.x);
            loadedModel.position.y += (loadedModel.position.y - center.y);
            loadedModel.position.z += (loadedModel.position.z - center.z);
            
            let meshCounter = 1;
            
            // วนลูปประมวลผลแยกชิ้นส่วนแบบเด็ดขาด ชิ้นใครชิ้นมัน 100%
            loadedModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    
                    // อ่านชื่อเดิมจากไฟล์ CAD ถ้าไม่มีหรือชื่อซ้ำให้ตั้งรหัสเฉพาะตัวแบบไม่ซ้ำ
                    let rawName = child.name ? child.name.trim() : "";
                    let uniqueKey = rawName;
                    
                    if (!uniqueKey || partDatabase[uniqueKey]) {
                        uniqueKey = "Component_" + String(meshCounter).padStart(3, '0');
                    }
                    
                    // ผูกคีย์เฉพาะตัวลงในโมเดล
                    child.name = uniqueKey;
                    
                    // ดึงคำอธิบายตัวอย่างมาหยอด หรือสร้างชื่อเผื่อไว้ให้คุณแก้ไขตารางข้อมูลในภายหลังได้ง่าย
                    let sampleDesc = sampleDescriptions[meshCounter - 1] || (uniqueKey + " Description");
                    let samplePN = "4000" + String(3200 + meshCounter);
                    
                    // ลงทะเบียนพาร์ทแยกเดี่ยวอิสระในฐานข้อมูลหลัก
                    partDatabase[uniqueKey] = {
                        id: samplePN,
                        name: sampleDesc,
                        img: "https://via.placeholder.com/200x120/ffffff/000000?text=" + uniqueKey
                    };
                    
                    meshCounter++;
                }
            });

            // เมื่อประมวลผลชิ้นส่วน 3D เสร็จสิ้น ให้ทำการสร้างแถบรายการฝั่งขวาทันที
            buildPartsListUI();
            scene.add(loadedModel);
        });

        // ================= ระบบ Raycasting (เมาส์ชี้ และ คลิกชิ้นส่วนส่งลงตะกร้า) =================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');
        const tooltipImg = document.getElementById('tooltip-img');
        const tooltipId = document.getElementById('tooltip-id');
        const tooltipName = document.getElementById('tooltip-name');
        let intersectedObject = null;

        window.addEventListener('mousemove', onMouseMove, false);
        window.addEventListener('click', onModelClick, false);

        function onMouseMove(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            tooltip.style.left = (event.clientX + 15) + 'px';
            tooltip.style.top = (event.clientY + 15) + 'px';

            if (loadedModel) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(loadedModel.children, true);

                if (intersects.length > 0) {
                    const hitObj = intersects[0].object;
                    
                    if (partDatabase[hitObj.name]) {
                        if (intersectedObject !== hitObj) {
                            if (intersectedObject) intersectedObject.material.emissive.setHex(0x000000);
                            
                            intersectedObject = hitObj;
                            intersectedObject.material.emissive.setHex(0x0e639c); // ไฮไลท์เรืองแสงชิ้นส่วนเดี่ยวที่ชี้

                            const pInfo = partDatabase[hitObj.name];
                            tooltipImg.src = pInfo.img;
                            tooltipId.innerText = "PART NO: " + pInfo.id;
                            tooltipName.innerText = pInfo.name;
                            tooltip.style.display = 'block';
                        }
                    }
                } else {
                    if (intersectedObject) intersectedObject.material.emissive.setHex(0x000000);
                    intersectedObject = null;
                    tooltip.style.display = 'none';
                }
            }
        }

        function onModelClick(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            // ตรวจสอบพิกัดการคลิกให้อยู่ภายในกรอบพื้นที่หน้าจอ 3D เท่านั้น
            if (event.clientX > rect.right || event.clientX < rect.left || event.clientY > rect.bottom || event.clientY < rect.top) {
                return;
            }

            if (loadedModel) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(loadedModel.children, true);

                if (intersects.length > 0) {
                    const hitObj = intersects[0].object;
                    const meshName = hitObj.name;
                    
                    if (partDatabase[meshName]) {
                        const cb = document.getElementById(`check-${meshName}`);
                        
                        if (cb) {
                            if (!cb.checked) {
                                cb.checked = true;
                                togglePart(meshName, true);
                            } else {
                                adjustQty(meshName, 1); // คลิกซ้ำเพื่อบวกจำนวนเพิ่ม
                            }
                        }
                    }
                }
            }
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
    </script>
</body>
</html>
