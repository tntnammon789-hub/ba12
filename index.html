<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional 3D Spare Part Catalog - Definitive Hotspots</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
        }

        .wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* หน้าจอสตูดิโอ 3D (75%) */
        #canvas-container {
            width: 75vw;
            height: 100vh;
            position: relative;
            background-color: #222222;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* Sidebar แผงควบคุมคลังสินค้าด้านขวา (25%) */
        #sidebar {
            width: 25vw;
            height: 100vh;
            background-color: #262626;
            border-left: 2px solid #3a3a3a;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #0e639c;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .section-title {
            padding: 10px 20px;
            background-color: #333333;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            border-bottom: 1px solid #444;
        }

        #parts-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .part-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #333;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #444;
            transition: all 0.2s ease;
        }

        .part-item:hover {
            border-color: #0e639c;
            background-color: #3d3d3d;
        }

        .part-info { display: flex; flex-direction: column; max-width: 80%; }
        .part-id { font-size: 0.75rem; color: #0e639c; font-weight: bold; }
        .part-name { font-size: 0.9rem; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        /* ตะกร้าสรุปรายการสั่งซื้อด้านล่าง (Cart) */
        #cart-container {
            height: 40vh;
            background-color: #1e1e1e;
            border-top: 2px solid #3a3a3a;
            display: flex;
            flex-direction: column;
        }

        #cart-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #2d2d2d;
            padding: 8px 12px;
            margin-bottom: 6px;
            border-radius: 4px;
            font-size: 0.85rem;
            border-left: 4px solid #0e639c;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-qty {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 2px 6px;
            cursor: pointer;
            border-radius: 3px;
            font-weight: bold;
        }
        .btn-qty:hover { background-color: #1177bb; }

        .btn-remove {
            background-color: #a61c1c;
            color: white;
            border: none;
            padding: 2px 6px;
            cursor: pointer;
            border-radius: 3px;
        }

        /* Tooltip กล่องป๊อปอัปเมื่อชี้หมุด */
        #tooltip {
            position: fixed;
            display: none;
            background-color: rgba(30, 30, 30, 0.95);
            border: 2px solid #0e639c;
            padding: 12px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 220px;
        }

        #tooltip img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 8px;
            border: 1px solid #444;
            background-color: #fff;
        }

        .tooltip-title { font-weight: bold; color: #0e639c; font-size: 0.85rem; }
        .tooltip-name { font-size: 0.9rem; margin-top: 2px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div class="wrapper">
        
        <!-- ฝั่งหน้าจอแสดงผล 3D -->
        <div id="canvas-container">
            <div id="tooltip">
                <img id="tooltip-img" src="" alt="Part Image">
                <div id="tooltip-id" class="tooltip-title">PART NO: </div>
                <div id="tooltip-name" class="tooltip-name">Part Name</div>
            </div>
        </div>

        <!-- แผง Sidebar ควบคุมข้อมูลฝั่งขวา -->
        <div id="sidebar">
            <div class="sidebar-header">ALPHA COMPACT LH / RH</div>
            
            <div class="section-title">Available Parts (Hover/Select)</div>
            <div id="parts-list"></div>
            
            <div class="section-title">Selected Parts List (Cart)</div>
            <div id="cart-container">
                <div id="cart-list"></div>
            </div>
        </div>

    </div>

    <script>
        // 1. ตารางคลังข้อมูลอะไหล่แยกชิ้นเดี่ยวอิงตามสเปกเฉดสีและคู่มือจริง
        const partDatabase = {
            "Part_Unwinder": { id: "35001802", name: "Unwinder disc / จานม้วนบน", pos: {x: -2, y: 10, z: 2}, img: "https://via.placeholder.com/200x120/ffffff/000000?text=Unwinder+Disc" },
            "Part_Drive_Roller": { id: "32901027", name: "Drive roller rubber / ลูกกลิ้งยาง", pos: {x: 1, y: 2, z: 4}, img: "https://via.placeholder.com/200x120/ffffff/000000?text=Drive+Roller" },
            "Part_Tension_Bar": { id: "35001871", name: "Unwinder roller / แกนประคองดำ", pos: {x: 2, y: 5, z: 1}, img: "https://via.placeholder.com/200x120/ffffff/000000?text=Tension+Bar" },
            "Part_Label_Sensor": { id: "33090245", name: "Label sensor / เซนเซอร์ตรวจจับฉลาก", pos: {x: -1, y: 0, z: 3}, img: "https://via.placeholder.com/200x120/ffffff/000000?text=Label+Sensor" },
            "Part_Brass_Sheet": { id: "35001414", name: "Spring sheet / แผ่นทองเหลืองนำร่อง", pos: {x: -0.5, y: 1.5, z: 4}, img: "https://via.placeholder.com/200x120/ffffff/000000?text=Spring+Sheet" },
            "Part_Peeler_Plate": { id: "32910403", name: "Applicator sheet / แผ่นสลัดฉลากล่าง", pos: {x: -3, y: -4, z: 5}, img: "https://via.placeholder.com/200x120/ffffff/000000?text=Peeler+Plate" }
        };

        let selectedPartsCart = {};
        let hotspotMeshes = []; // อาเรย์สำหรับเก็บหมุดอัจฉริยะแยกอิสระ

        // สร้างรายการพาร์ทในแผงเมนูด้านขวา
        const partsListUI = document.getElementById('parts-list');
        for (const [keyId, info] of Object.entries(partDatabase)) {
            const item = document.createElement('div');
            item.className = 'part-item';
            item.innerHTML = `
                <div class="part-info">
                    <span class="part-id">P/N: ${info.id}</span>
                    <span class="part-name">${info.name}</span>
                </div>
                <input type="checkbox" id="check-${keyId}" onchange="togglePart('${keyId}', this.checked)">
            `;
            partsListUI.appendChild(item);
        }

        function togglePart(keyId, isChecked) {
            if (isChecked) {
                if (!selectedPartsCart[keyId]) selectedPartsCart[keyId] = 1;
            } else {
                delete selectedPartsCart[keyId];
            }
            updateCartUI();
        }

        function adjustQty(keyId, change) {
            if (selectedPartsCart[keyId]) {
                selectedPartsCart[keyId] += change;
                if (selectedPartsCart[keyId] <= 0) {
                    delete selectedPartsCart[keyId];
                    const cb = document.getElementById(`check-${keyId}`);
                    if(cb) cb.checked = false;
                }
                updateCartUI();
            }
        }

        function removePart(keyId) {
            delete selectedPartsCart[keyId];
            const cb = document.getElementById(`check-${keyId}`);
            if(cb) cb.checked = false;
            updateCartUI();
        }

        function updateCartUI() {
            const cartListUI = document.getElementById('cart-list');
            cartListUI.innerHTML = '';
            
            for (const [keyId, qty] of Object.entries(selectedPartsCart)) {
                const info = partDatabase[keyId];
                const item = document.createElement('div');
                item.className = 'cart-item';
                item.innerHTML = `
                    <div style="display:flex; flex-direction:column; max-width:60%;">
                        <span style="font-weight:bold; font-size:0.75rem; color:#0e639c;">${info.id}</span>
                        <span style="text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">${info.name}</span>
                    </div>
                    <div class="qty-controls">
                        <button class="btn-qty" onclick="adjustQty('${keyId}', -1)">-</button>
                        <span>${qty}</span>
                        <button class="btn-qty" onclick="adjustQty('${keyId}', 1)">+</button>
                        <button class="btn-remove" onclick="removePart('${keyId}')">✕</button>
                    </div>
                `;
                cartListUI.appendChild(item);
            }
        }

        // ================= เอนจิ้นกราฟิก Three.js =================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 8, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(15, 30, 20);
        scene.add(dirLight);

        // โหลดโมเดลหลักชิ้นผืนเดียวกันเข้ามาแสดงผล
        const filename = "32100033_A_Comp_120_RH.step.glb";
        const loader = new THREE.GLTFLoader();
        
        loader.load(filename, function (gltf) {
            const model = gltf.scene;
            
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.x += (model.position.x - center.x);
            model.position.y += (model.position.y - center.y);
            model.position.z += (model.position.z - center.z);
            
            scene.add(model);

            // เมื่อตัวเครื่องโหลดเสร็จ ทำการสร้างหมุดอัจฉริยะลอยเหนือเฉดสีตามพิกัดโครงสร้าง
            createVectorHotspots();
        });

        // ฟังก์ชันคำนวณและปักหมุดเรืองแสงอัจฉริยะแยกชิ้นอิสระ 100%
        function createVectorHotspots() {
            for (const [keyId, info] of Object.entries(partDatabase)) {
                // สร้างรูปทรงกลมขนาดกำลังดีเป็นตัวแทนหมุด
                const geometry = new THREE.SphereGeometry(0.4, 32, 32);
                const material = new THREE.MeshBasicMaterial({
                    color: 0x0e639c,
                    transparent: true,
                    opacity: 0.85
                });
                const sphere = new THREE.Mesh(geometry, material);
                
                // สั่งจัดวางพิกัดให้อยู่ตรงตำแหน่งเฉดสีชิ้นส่วนนั้นๆ
                sphere.position.set(info.pos.x, info.pos.y, info.pos.z);
                sphere.name = keyId; // ฝังคีย์ระบุรหัสอะไหล่เฉพาะตัว
                
                scene.add(sphere);
                hotspotMeshes.push(sphere); // บันทึกเข้าอาเรย์แยกเช็คจุดชน
            }
        }

        // ================= ระบบการตรวจจับเมาส์ยิงตรงไปที่ตัวหมุด (Hotspot Raycasting) =================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');
        const tooltipImg = document.getElementById('tooltip-img');
        const tooltipId = document.getElementById('tooltip-id');
        const tooltipName = document.getElementById('tooltip-name');
        let activeHoveredHotspot = null;

        window.addEventListener('mousemove', onMouseMove, false);
        window.addEventListener('click', onModelClick, false);

        function onMouseMove(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            tooltip.style.left = (event.clientX + 15) + 'px';
            tooltip.style.top = (event.clientY + 15) + 'px';

            if (hotspotMeshes.length > 0) {
                raycaster.setFromCamera(mouse, camera);
                // สั่งการให้ Raycaster ตรวจสอบพิกัดการชนพุ่งเป้าไปที่กลุ่มตัวหมุด Hotspot เท่านั้น ป้องกันปัญหาสีรวมร่างกันทั้งเครื่อง
                const intersects = raycaster.intersectObjects(hotspotMeshes);

                if (intersects.length > 0) {
                    const hitHotspot = intersects[0].object;
                    
                    if (activeHoveredHotspot !== hitHotspot) {
                        if (activeHoveredHotspot) activeHoveredHotspot.material.color.setHex(0x0e639c); // คืนสีเดิม
                        
                        activeHoveredHotspot = hitHotspot;
                        activeHoveredHotspot.material.color.setHex(0x00ffcc); // ส่องแสงสีเขียวเรืองแสงเมื่อเมาส์ชี้โดนตัวหมุด

                        const pInfo = partDatabase[hitHotspot.name];
                        tooltipImg.src = pInfo.img;
                        tooltipId.innerText = "PART NO: " + pInfo.id;
                        tooltipName.innerText = pInfo.name;
                        tooltip.style.display = 'block';
                    }
                } else {
                    if (activeHoveredHotspot) activeHoveredHotspot.material.color.setHex(0x0e639c);
                    activeHoveredHotspot = null;
                    tooltip.style.display = 'none';
                }
            }
        }

        function onModelClick(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            if (event.clientX > rect.right || event.clientX < rect.left || event.clientY > rect.bottom || event.clientY < rect.top) {
                return;
            }

            if (hotspotMeshes.length > 0) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(hotspotMeshes);

                if (intersects.length > 0) {
                    const hitHotspot = intersects[0].object;
                    const keyId = hitHotspot.name;
                    
                    if (partDatabase[keyId]) {
                        const cb = document.getElementById(`check-${keyId}`);
                        if (cb) {
                            // สลับสถานะติ๊กเครื่องหมายถูกที่กล่องสี่เหลี่ยมด้านขวา และสั่งรันข้อมูลพาร์ทลิสต์ลงกล่องด้านล่างทันที
                            cb.checked = !cb.checked;
                            togglePart(keyId, cb.checked);
                        }
                    }
                }
            }
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
    </script>
</body>
</html>
