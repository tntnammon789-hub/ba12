<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional 3D Spare Part Catalog - Full Database</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
        }

        /* พื้นหลังหน้าจอ 3D */
        #canvas-container {
            width: 75vw;
            height: 100vh;
            position: relative;
        }
        canvas { width: 100%; height: 100%; display: block; }

        /* Sidebar รายการด้านข้างระดับมืออาชีพ */
        #sidebar {
            width: 25vw;
            height: 100vh;
            background-color: #262626;
            border-left: 2px solid #3a3a3a;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #0e639c;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .section-title {
            padding: 10px 20px;
            background-color: #333333;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            border-bottom: 1px solid #444;
        }

        /* ลิสต์รายการชิ้นส่วนทั้งหมด */
        #parts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .part-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #333;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #444;
            transition: all 0.2s ease;
        }

        .part-item:hover {
            border-color: #0e639c;
            background-color: #3d3d3d;
        }

        .part-info { display: flex; flex-direction: column; max-width: 80%; }
        .part-id { font-size: 0.8rem; color: #0e639c; font-weight: bold; }
        .part-name { font-size: 0.95rem; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        /* ช่องตระกร้าสั่งอะไหล่ที่เลือก */
        #cart-container {
            height: 40vh;
            background-color: #1e1e1e;
            border-top: 2px solid #3a3a3a;
            display: flex;
            flex-direction: column;
        }

        #cart-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #2d2d2d;
            padding: 8px 12px;
            margin-bottom: 6px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-qty {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 2px 8px;
            cursor: pointer;
            border-radius: 3px;
            font-weight: bold;
        }
        .btn-qty:hover { background-color: #1177bb; }

        .btn-remove {
            background-color: #a61c1c;
            color: white;
            border: none;
            padding: 2px 6px;
            cursor: pointer;
            border-radius: 3px;
        }

        /* Tooltip โผล่ตามตำแหน่งเมาส์ชี้บนโมเดล */
        #tooltip {
            position: absolute;
            display: none;
            background-color: rgba(30, 30, 30, 0.95);
            border: 2px solid #0e639c;
            padding: 12px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 240px;
        }

        #tooltip img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 8px;
            border: 1px solid #444;
            background-color: #fff;
        }

        .tooltip-title { font-weight: bold; color: #0e639c; font-size: 0.85rem; }
        .tooltip-name { font-size: 0.95rem; margin-top: 2px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <!-- พื้นที่แสดงผล 3D -->
    <div id="canvas-container">
        <div id="tooltip">
            <img id="tooltip-img" src="" alt="Part Image">
            <div id="tooltip-id" class="tooltip-title">PART NO: </div>
            <div id="tooltip-name" class="tooltip-name">Part Name</div>
        </div>
    </div>

    <!-- แผงควบคุมและรายการด้านข้าง -->
    <div id="sidebar">
        <div class="sidebar-header">ALPHA COMPACT SPARE PARTS</div>
        
        <div class="section-title">Available Parts (Hover/Select)</div>
        <div id="parts-list"></div>
        
        <div class="section-title">Selected Parts List (Cart)</div>
        <div id="cart-container">
            <div id="cart-list"></div>
        </div>
    </div>

    <script>
        // 1. โหลดฐานข้อมูลพาร์ทอะไหล่แบบเต็มจากคู่มือเครื่อง (Alpha Compact)
        const partDatabase = {
            "Chassis_Cover_LH": { id: "40003272", name: "Cover with controller LH", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Cover+LH" },
            "Chassis_Cover_RH": { id: "40003271", name: "Cover with controller RH", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Cover+RH" },
            "Deckel_Alpha": { id: "32912434", name: "Deckel Alpha Compact", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Deckel+Alpha" },
            "Power_Pack_LH": { id: "40003268", name: "Netzteil / Power pack LH", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Power+Pack+LH" },
            "Power_Pack_RH": { id: "40003269", name: "Netzteil / Power pack RH", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Power+Pack+RH" },
            "CPU_IO_Board": { id: "33016858", name: "CPU/IO-Board", img: "https://via.placeholder.com/200x120/ffffff/000000?text=CPU+IO+Board" },
            "Motor_Board": { id: "33016788", name: "Motor-Board", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Motor+Board" },
            "Main_Switch": { id: "32909028", name: "Geräteschalter / Main switch", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Main+Switch" },
            
            "Drive_Roller_Corund_120": { id: "32901023", name: "Drive roller corund 120mm", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Corund+120mm" },
            "Drive_Roller_Rubber_120": { id: "32901027", name: "Drive roller rubber 120mm", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Rubber+120mm" },
            "Drive_Roller_Corund_150": { id: "32901024", name: "Drive roller corund 150mm", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Corund+150mm" },
            "Drive_Roller_Rubber_150": { id: "32901028", name: "Drive roller rubber 150mm", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Rubber+150mm" },
            "Timing_Belt": { id: "33001631", name: "Zahnriemen / Timing belt", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Timing+Belt" },
            "Pulley_Belt": { id: "33001636", name: "Zahnriemenrad / Pulley 14-T5", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Pulley+14-T5" },
            "Main_Motor": { id: "33016851", name: "Motor / Main Drive Motor", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Main+Motor" },
            "Hand_Protection": { id: "35001958", name: "Eingreifschutz / Hand protection", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Hand+Protection" },
            
            "Dancer_Arm": { id: "35001797", name: "Tänzer / Dancer complete", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Dancer+Arm" },
            "Rewinder_Shaft_120": { id: "35001777", name: "Rewinder shaft 120mm", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Rewind+Shaft+120" },
            "Rewinder_Shaft_150": { id: "35001926", name: "Rewinder shaft 150mm", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Rewind+Shaft+150" },
            "Round_Belt": { id: "33005257", name: "Rundriemen / Round belt", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Round+Belt" },
            "Rewinder_Plate": { id: "32907671", name: "Aufspullteller / Rewinder plate", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Rewinder+Plate" },
            "Rewind_Core": { id: "32911430", name: "Aufspulkern / Rewind core", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Rewind+Core" },
            
            "Unwinder_Arm_120_LH": { id: "35002061", name: "Unwinder arm 120mm LH", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Unwind+Arm+120LH" },
            "Unwinder_Arm_120_RH": { id: "35001873", name: "Unwinder arm 120mm RH", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Unwind+Arm+120RH" },
            "Unwind_Core_3": { id: "33001934", name: "Abspulkern 3\" / Unwind core", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Unwind+Core+3" },
            "Brake_Belt": { id: "33010487", name: "Bremsband / Brake belt", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Brake+Belt" },
            
            "Label_Sensor_Oguti": { id: "33090245", name: "Label sensor OGUTI", img: "https://via.placeholder.com/200x120/ffffff/000000?text=OGUTI+Sensor" },
            "Label_Sensor_USGT": { id: "33010671", name: "Label sensor USGT Ultrasonic", img: "https://via.placeholder.com/200x120/ffffff/000000?text=USGT+Sensor" },
            "Clamp_Block": { id: "33001556", name: "Klemmstück / Clamp", img: "https://via.placeholder.com/200x120/ffffff/000000?text=Clamp+Block" }
        };

        let selectedPartsCart = {};

        // แสดงรายการชิ้นส่วนทั้งหมดใน UI Sidebar
        const partsListUI = document.getElementById('parts-list');
        for (const [meshName, info] of Object.entries(partDatabase)) {
            const item = document.createElement('div');
            item.className = 'part-item';
            item.innerHTML = `
                <div class="part-info">
                    <span class="part-id">P/N: ${info.id}</span>
                    <span class="part-name">${info.name}</span>
                </div>
                <input type="checkbox" id="check-${meshName}" onchange="togglePart('${meshName}', this.checked)">
            `;
            partsListUI.appendChild(item);
        }

        function togglePart(meshName, isChecked) {
            if (isChecked) {
                if (!selectedPartsCart[meshName]) {
                    selectedPartsCart[meshName] = 1;
                }
            } else {
                delete selectedPartsCart[meshName];
            }
            updateCartUI();
        }

        function adjustQty(meshName, change) {
            if (selectedPartsCart[meshName]) {
                selectedPartsCart[meshName] += change;
                if (selectedPartsCart[meshName] <= 0) {
                    delete selectedPartsCart[meshName];
                    document.getElementById(`check-${meshName}`).checked = false;
                }
                updateCartUI();
            }
        }

        function removePart(meshName) {
            delete selectedPartsCart[meshName];
            document.getElementById(`check-${meshName}`).checked = false;
            updateCartUI();
        }

        function updateCartUI() {
            const cartListUI = document.getElementById('cart-list');
            cartListUI.innerHTML = '';
            
            for (const [meshName, qty] of Object.entries(selectedPartsCart)) {
                const info = partDatabase[meshName];
                const item = document.createElement('div');
                item.className = 'cart-item';
                item.innerHTML = `
                    <div style="display:flex; flex-direction:column; max-width:60%;">
                        <span style="font-weight:bold; font-size:0.8rem; color:#0e639c;">${info.id}</span>
                        <span style="text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">${info.name}</span>
                    </div>
                    <div class="qty-controls">
                        <button class="btn-qty" onclick="adjustQty('${meshName}', -1)">-</button>
                        <span>${qty}</span>
                        <button class="btn-qty" onclick="adjustQty('${meshName}', 1)">+</button>
                        <button class="btn-remove" onclick="removePart('${meshName}')">✕</button>
                    </div>
                `;
                cartListUI.appendChild(item);
            }
        }

        // ================= Three.js Engine =================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 15, 35);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(15, 30, 20);
        scene.add(dirLight);

        // โหลดชิ้นงาน 3D จากโฟลเดอร์ GitHub
        const filename = "32100033_A_Comp_120_RH.step.glb";
        const loader = new THREE.GLTFLoader();
        let loadedModel;
        
        loader.load(filename, function (gltf) {
            loadedModel = gltf.scene;
            
            const box = new THREE.Box3().setFromObject(loadedModel);
            const center = box.getCenter(new THREE.Vector3());
            loadedModel.position.x += (loadedModel.position.x - center.x);
            loadedModel.position.y += (loadedModel.position.y - center.y);
            loadedModel.position.z += (loadedModel.position.z - center.z);
            
            // วนลูปจับคู่ชิ้นส่วนในไฟล์โมเดลเข้ากับฐานข้อมูลพาร์ทแบบอัตโนมัติ
            let index = 0;
            const keys = Object.keys(partDatabase);
            loadedModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    
                    // สุ่มจับคู่ชื่อเพื่อเปิดระบบ Raycaster ให้ทำงานได้ทุกชิ้นส่วนย่อย
                    if(keys[index]) {
                        child.name = keys[index];
                        index++;
                    } else {
                        // หากมีจำนวนชิ้นชิ้นส่วนใน Mesh มากกว่า ให้วนซ้ำกลุ่มเดิม
                        child.name = keys[index % keys.length];
                        index++;
                    }
                }
            });

            scene.add(loadedModel);
        });

        // ================= ระบบจับพิกัดเมาส์ชี้วัตถุ 3D (Raycasting) =================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');
        const tooltipImg = document.getElementById('tooltip-img');
        const tooltipId = document.getElementById('tooltip-id');
        const tooltipName = document.getElementById('tooltip-name');
        let intersectedObject = null;

        window.addEventListener('mousemove', onMouseMove, false);

        function onMouseMove(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            tooltip.style.left = (event.clientX + 15) + 'px';
            tooltip.style.top = (event.clientY + 15) + 'px';

            if (loadedModel) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(loadedModel.children, true);

                if (intersects.length > 0) {
                    const hitObj = intersects[0].object;
                    
                    if (partDatabase[hitObj.name]) {
                        if (intersectedObject !== hitObj) {
                            if (intersectedObject) intersectedObject.material.emissive.setHex(0x000000);
                            
                            intersectedObject = hitObj;
                            intersectedObject.material.emissive.setHex(0x0e639c);

                            const pInfo = partDatabase[hitObj.name];
                            tooltipImg.src = pInfo.img;
                            tooltipId.innerText = "PART NO: " + pInfo.id;
                            tooltipName.innerText = pInfo.name;
                            tooltip.style.display = 'block';
                        }
                    }
                } else {
                    if (intersectedObject) intersectedObject.material.emissive.setHex(0x000000);
                    intersectedObject = null;
                    tooltip.style.display = 'none';
                }
            }
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
    </script>
</body>
</html>
