<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional 3D Spare Part Catalog - Independent Selection</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
        }

        .wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* หน้าจอแสดงผล 3D (75%) */
        #canvas-container {
            width: 75vw;
            height: 100vh;
            position: relative;
            background-color: #222222;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            cursor: pointer;
        }

        /* Sidebar รายการด้านข้าง (25%) */
        #sidebar {
            width: 25vw;
            height: 100vh;
            background-color: #262626;
            border-left: 2px solid #3a3a3a;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #0e639c;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .section-title {
            padding: 10px 20px;
            background-color: #333333;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            border-bottom: 1px solid #444;
        }

        #parts-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .part-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #333;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #444;
            transition: all 0.2s ease;
        }

        .part-item:hover {
            border-color: #0e639c;
            background-color: #3d3d3d;
        }

        .part-info { display: flex; flex-direction: column; max-width: 80%; }
        .part-id { font-size: 0.75rem; color: #0e639c; font-weight: bold; }
        .part-name { font-size: 0.9rem; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        /* ตะกร้าสรุปรายการสั่งอะไหล่ด้านล่าง */
        #cart-container {
            height: 40vh;
            background-color: #1e1e1e;
            border-top: 2px solid #3a3a3a;
            display: flex;
            flex-direction: column;
        }

        #cart-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #2d2d2d;
            padding: 8px 12px;
            margin-bottom: 6px;
            border-radius: 4px;
            font-size: 0.85rem;
            border-left: 4px solid #0e639c;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-qty {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 2px 6px;
            cursor: pointer;
            border-radius: 3px;
            font-weight: bold;
        }
        .btn-qty:hover { background-color: #1177bb; }

        .btn-remove {
            background-color: #a61c1c;
            color: white;
            border: none;
            padding: 2px 6px;
            cursor: pointer;
            border-radius: 3px;
        }

        /* Tooltip โผล่ตามตำแหน่งเมาส์ชี้ */
        #tooltip {
            position: fixed;
            display: none;
            background-color: rgba(30, 30, 30, 0.95);
            border: 2px solid #0e639c;
            padding: 12px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 220px;
        }

        #tooltip img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 8px;
            border: 1px solid #444;
            background-color: #fff;
        }

        .tooltip-title { font-weight: bold; color: #0e639c; font-size: 0.85rem; }
        .tooltip-name { font-size: 0.9rem; margin-top: 2px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div class="wrapper">
        
        <!-- ฝั่งหน้าจอ 3D -->
        <div id="canvas-container">
            <div id="tooltip">
                <img id="tooltip-img" src="" alt="Part Image">
                <div id="tooltip-id" class="tooltip-title">PART NO: </div>
                <div id="tooltip-name" class="tooltip-name">Part Name</div>
            </div>
        </div>

        <!-- ฝั่งแผงควบคุมและรายการด้านข้าง -->
        <div id="sidebar">
            <div class="sidebar-header">ALPHA COMPACT LH / RH</div>[cite: 1]
            
            <div class="section-title">Available Parts (Hover/Select)</div>
            <div id="parts-list"></div>
            
            <div class="section-title">Selected Parts List (Cart)</div>
            <div id="cart-container">
                <div id="cart-list"></div>
            </div>
        </div>

    </div>

    <script>
        let partDatabase = {};
        let selectedPartsCart = {};

        // ฟังก์ชันสร้างรายการชิ้นส่วนฝั่ง Sidebar UI
        function buildPartsListUI() {
            const partsListUI = document.getElementById('parts-list');
            partsListUI.innerHTML = '';
            
            for (const [uniqueId, info] of Object.entries(partDatabase)) {
                const item = document.createElement('div');
                item.className = 'part-item';
                item.innerHTML = `
                    <div class="part-info">
                        <span class="part-id">P/N: ${info.id}</span>
                        <span class="part-name">${info.name}</span>
                    </div>
                    <input type="checkbox" id="check-${uniqueId}" onchange="togglePart('${uniqueId}', this.checked)">
                `;
                partsListUI.appendChild(item);
            }
        }

        // เมื่อมีการคลิกติ๊กถูกที่กล่องสี่เหลี่ยมด้านข้าง จึงจะเพิ่มรายการลงในช่องรายการด้านล่าง
        function togglePart(uniqueId, isChecked) {
            if (isChecked) {
                if (!selectedPartsCart[uniqueId]) {
                    selectedPartsCart[uniqueId] = 1;
                }
            } else {
                delete selectedPartsCart[uniqueId];
            }
            updateCartUI();
        }

        function adjustQty(uniqueId, change) {
            if (selectedPartsCart[uniqueId]) {
                selectedPartsCart[uniqueId] += change;
                if (selectedPartsCart[uniqueId] <= 0) {
                    delete selectedPartsCart[uniqueId];
                    const cb = document.getElementById(`check-${uniqueId}`);
                    if(cb) cb.checked = false;
                }
                updateCartUI();
            }
        }

        function removePart(uniqueId) {
            delete selectedPartsCart[uniqueId];
            const cb = document.getElementById(`check-${uniqueId}`);
            if(cb) cb.checked = false;
            updateCartUI();
        }

        // แสดงผลเฉพาะรายการอะไหล่ที่ถูกเลือก (ติ๊กถูก) เท่านั้น
        function updateCartUI() {
            const cartListUI = document.getElementById('cart-list');
            cartListUI.innerHTML = '';
            
            for (const [uniqueId, qty] of Object.entries(selectedPartsCart)) {
                const info = partDatabase[uniqueId];
                const item = document.createElement('div');
                item.className = 'cart-item';
                item.innerHTML = `
                    <div style="display:flex; flex-direction:column; max-width:60%;">
                        <span style="font-weight:bold; font-size:0.75rem; color:#0e639c;">${info.id}</span>
                        <span style="text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">${info.name}</span>
                    </div>
                    <div class="qty-controls">
                        <button class="btn-qty" onclick="adjustQty('${uniqueId}', -1)">-</button>
                        <span>${qty}</span>
                        <button class="btn-qty" onclick="adjustQty('${uniqueId}', 1)">+</button>
                        <button class="btn-remove" onclick="removePart('${uniqueId}')">✕</button>
                    </div>
                `;
                cartListUI.appendChild(item);
            }
        }

        // ================= เอนจิ้นหลัก Three.js =================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 15, 35);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(15, 30, 20);
        scene.add(dirLight);

        // รายการคีย์ข้อมูลจำลองสำหรับชิ้นส่วนแกนและชิ้นส่วนหลัก
        const sampleDescriptions = [
            "Cover Alpha Compact", "Drive roller rubber 120mm", "Rewinder Plate", "Unwind core 3\"",[cite: 1]
            "Timing belt", "Pulley 14-T5", "Main Drive Motor", "Hand protection", "Dancer complete",[cite: 1]
            "Rewinder shaft", "Round belt", "Label sensor OGUTI", "Label sensor USGT", "Clamp"[cite: 1]
        ];

        // โหลดโมเดล 3D
        const filename = "32100033_A_Comp_120_RH.step.glb";
        const loader = new THREE.GLTFLoader();
        let loadedModel;
        
        loader.load(filename, function (gltf) {
            loadedModel = gltf.scene;
            
            const box = new THREE.Box3().setFromObject(loadedModel);
            const center = box.getCenter(new THREE.Vector3());
            loadedModel.position.x += (loadedModel.position.x - center.x);
            loadedModel.position.y += (loadedModel.position.y - center.y);
            loadedModel.position.z += (loadedModel.position.z - center.z);
            
            let meshCounter = 1;
            
            // ลอการิทึมสแกนโครงสร้างเชิงลึกเพื่อบังคับตัดไดคัต (Mesh Isolation Logic) แยกเดี่ยวชิ้นต่อชิ้น
            loadedModel.traverse((child) => {
                if (child.isMesh) {
                    // สร้าง Material สำเนาแยกขาดจากวัตถุชิ้นอื่น ป้องกันปัญหาสีไฮไลท์วิ่งไปโดนจุดที่แชร์ Material ร่วมกัน
                    if (child.material) {
                        child.material = child.material.clone();
                    }
                    
                    child.castShadow = true;
                    child.receiveShadow = true;
                    
                    // วิเคราะห์และออกรหัสภายในเฉพาะชิ้น (UUID-Based Isolation) ป้องกันปัญหาการจัดกลุ่มชนกัน
                    let targetKey = child.uuid;
                    child.name = targetKey;
                    
                    let sampleDesc = sampleDescriptions[meshCounter - 1] || ("Component Part " + meshCounter);
                    let samplePN = "4000" + String(3200 + meshCounter);
                    
                    // ลงทะเบียนจับคู่ชิ้นส่วนแบบ 1-to-1 แยกขาดจากกันเด็ดขาด
                    partDatabase[targetKey] = {
                        id: samplePN,
                        name: sampleDesc,
                        img: "https://via.placeholder.com/200x120/ffffff/000000?text=Part+" + meshCounter
                    };
                    
                    meshCounter++;
                }
            });

            buildPartsListUI();
            scene.add(loadedModel);
        });

        // ================= ระบบ Raycasting (เมาส์ชี้ และ คลิกเลือกกล่องสี่เหลี่ยมด้านข้าง) =================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');
        const tooltipImg = document.getElementById('tooltip-img');
        const tooltipId = document.getElementById('tooltip-id');
        const tooltipName = document.getElementById('tooltip-name');
        let intersectedObject = null;

        window.addEventListener('mousemove', onMouseMove, false);
        window.addEventListener('click', onModelClick, false);

        function onMouseMove(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            tooltip.style.left = (event.clientX + 15) + 'px';
            tooltip.style.top = (event.clientY + 15) + 'px';

            if (loadedModel) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(loadedModel.children, true);

                if (intersects.length > 0) {
                    const hitObj = intersects[0].object;
                    
                    if (partDatabase[hitObj.name]) {
                        if (intersectedObject !== hitObj) {
                            if (intersectedObject) intersectedObject.material.emissive.setHex(0x000000);
                            
                            intersectedObject = hitObj;
                            // ไฮไลท์เรืองแสงสีฟ้าเฉพาะชิ้นเดี่ยวที่เมาส์ส่องถึงอย่างแม่นยำ
                            intersectedObject.material.emissive.setHex(0x0e639c);

                            const pInfo = partDatabase[hitObj.name];
                            tooltipImg.src = pInfo.img;
                            tooltipId.innerText = "PART NO: " + pInfo.id;
                            tooltipName.innerText = pInfo.name;
                            tooltip.style.display = 'block';
                        }
                    }
                } else {
                    if (intersectedObject) intersectedObject.material.emissive.setHex(0x000000);
                    intersectedObject = null;
                    tooltip.style.display = 'none';
                }
            }
        }

        function onModelClick(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            if (event.clientX > rect.right || event.clientX < rect.left || event.clientY > rect.bottom || event.clientY < rect.top) {
                return;
            }

            if (loadedModel) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(loadedModel.children, true);

                if (intersects.length > 0) {
                    const hitObj = intersects[0].object;
                    const uniqueId = hitObj.name;
                    
                    if (partDatabase[uniqueId]) {
                        const cb = document.getElementById(`check-${uniqueId}`);
                        if (cb) {
                            // การกดที่โมเดล 3D จะเปลี่ยนไปทำหน้าที่ "ติ๊กถูกให้กล่องสี่เหลี่ยมฝั่งขวา" ก่อน จากนั้นพาร์ทลิสต์จึงจะโชว์ด้านล่าง
                            cb.checked = !cb.checked;
                            togglePart(uniqueId, cb.checked);
                        }
                    }
                }
            }
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
    </script>
</body>
</html>
